apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: update-checkout-from-frontend
  namespace: default
spec:
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend-checkout-test
  podSelector:
    matchLabels:
      app: checkoutservice
  policyTypes:
  - Ingress
